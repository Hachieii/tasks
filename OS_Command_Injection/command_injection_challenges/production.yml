version: "3"

services:
  level01:
    build: ./cmdi_level1
    container_name: 'cmdi_level01'
    restart: 'unless-stopped'
    ports:
      - "3001:80"

  level02:
    build: ./cmdi_level2
    container_name: 'cmdi_level02'
    restart: 'unless-stopped'
    ports:
      - "3002:80"

  level03:
    build: ./cmdi_level3
    container_name: 'cmdi_level03'
    restart: 'unless-stopped'
    ports:
      - "3003:80"

  level04:
    build: ./cmdi_level4
    container_name: 'cmdi_level04'
    restart: 'unless-stopped'
    ports:
      - "3004:80"

  level05-proxy:
    image: nginx:stable
    ports:
      - "3005:80"
    volumes:
      - ./cmdi_level5/config/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
      - internet
      - no-internet
  level05:
    build: ./cmdi_level5
    container_name: 'cmdi_level05'
    restart: 'unless-stopped'
    networks:
      - no-internet
  level06-proxy:
    image: nginx:stable
    ports:
      - "3006:80"
    volumes:
      - ./cmdi_level6/config/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
      - internet
      - no-internet
  level06:
    build: ./cmdi_level6
    container_name: 'cmdi_level06'
    restart: 'unless-stopped'
    networks:
      - no-internet
  level07-proxy:
    image: nginx:stable
    ports:
      - "3007:80"
    volumes:
      - ./cmdi_level7/config/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
      - internet
      - no-internet
  level07:
    build: ./cmdi_level7
    container_name: 'cmdi_level07'
    restart: 'unless-stopped'
    networks:
      - no-internet

networks:
  internet: {}
  no-internet:
    internal: true
